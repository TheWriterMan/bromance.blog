name: Publish Scheduled Posts

on:
  schedule:
    # Run daily at 00:05 UTC
    - cron: '5 0 * * *'
  workflow_dispatch: # Manual trigger for immediate effect

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish scheduled posts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm tsx scripts/publish-scheduled.ts

      - name: Purge trash (30+ days old)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm tsx scripts/purge-trash.ts
