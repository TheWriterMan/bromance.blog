name: Database Backup

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # Manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Check for changes since last backup
        id: changes
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Get current counts and latest updated_at timestamps
          CURRENT=$(psql "$DATABASE_URL" -t -A -F'|' -c "
            SELECT
              (SELECT count(*) FROM posts WHERE deleted_at IS NULL),
              (SELECT count(*) FROM categories WHERE deleted_at IS NULL),
              (SELECT count(*) FROM tags),
              (SELECT count(*) FROM media_items),
              COALESCE((SELECT MAX(updated_at) FROM posts), '1970-01-01'::timestamptz),
              COALESCE((SELECT MAX(created_at) FROM comments), '1970-01-01'::timestamptz),
              COALESCE((SELECT MAX(created_at) FROM post_likes), '1970-01-01'::timestamptz);
          ")

          CURRENT_POSTS=$(echo "$CURRENT" | cut -d'|' -f1)
          CURRENT_CATEGORIES=$(echo "$CURRENT" | cut -d'|' -f2)
          CURRENT_TAGS=$(echo "$CURRENT" | cut -d'|' -f3)
          CURRENT_MEDIA=$(echo "$CURRENT" | cut -d'|' -f4)
          LATEST_POST_UPDATE=$(echo "$CURRENT" | cut -d'|' -f5)
          LATEST_COMMENT=$(echo "$CURRENT" | cut -d'|' -f6)
          LATEST_LIKE=$(echo "$CURRENT" | cut -d'|' -f7)

          # Get the last backup's counts and timestamp
          LAST_BACKUP=$(psql "$DATABASE_URL" -t -A -F'|' -c "
            SELECT post_count, category_count, tag_count, media_count, created_at
            FROM backups ORDER BY created_at DESC LIMIT 1;
          ")

          if [ -z "$LAST_BACKUP" ]; then
            echo "No previous backup found — proceeding."
            echo "SKIP=false" >> $GITHUB_ENV
            exit 0
          fi

          LAST_POSTS=$(echo "$LAST_BACKUP" | cut -d'|' -f1)
          LAST_CATEGORIES=$(echo "$LAST_BACKUP" | cut -d'|' -f2)
          LAST_TAGS=$(echo "$LAST_BACKUP" | cut -d'|' -f3)
          LAST_MEDIA=$(echo "$LAST_BACKUP" | cut -d'|' -f4)
          LAST_BACKUP_AT=$(echo "$LAST_BACKUP" | cut -d'|' -f5)

          # Check if any activity happened after the last backup
          ACTIVITY_AFTER=$(psql "$DATABASE_URL" -t -A -c "
            SELECT CASE WHEN
              '$LATEST_POST_UPDATE'::timestamptz > '$LAST_BACKUP_AT'::timestamptz OR
              '$LATEST_COMMENT'::timestamptz > '$LAST_BACKUP_AT'::timestamptz OR
              '$LATEST_LIKE'::timestamptz > '$LAST_BACKUP_AT'::timestamptz OR
              $CURRENT_POSTS != $LAST_POSTS OR
              $CURRENT_CATEGORIES != $LAST_CATEGORIES OR
              $CURRENT_TAGS != $LAST_TAGS OR
              $CURRENT_MEDIA != $LAST_MEDIA
            THEN 'true' ELSE 'false' END;
          ")

          if [ "$ACTIVITY_AFTER" = "false" ]; then
            echo "No changes since last backup — skipping."
            echo "SKIP=true" >> $GITHUB_ENV
          else
            echo "Changes detected — proceeding with backup."
            echo "SKIP=false" >> $GITHUB_ENV
          fi

      - name: Dump database
        if: env.SKIP != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          FILENAME="backup-${TIMESTAMP}.sql"
          pg_dump "$DATABASE_URL" --data-only --no-owner --no-privileges -f "$FILENAME"
          gzip "$FILENAME"
          echo "BACKUP_FILE=${FILENAME}.gz" >> $GITHUB_ENV
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV
          echo "BACKUP_SIZE=$(stat --printf='%s' ${FILENAME}.gz)" >> $GITHUB_ENV

      - name: Upload to Cloudinary
        if: env.SKIP != 'true'
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/raw/upload" \
            -F "file=@${BACKUP_FILE}" \
            -F "public_id=bromance-blog/backups/backup-${TIMESTAMP}" \
            -F "resource_type=raw" \
            -u "${CLOUDINARY_API_KEY}:${CLOUDINARY_API_SECRET}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "$BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Cloudinary upload failed with HTTP $HTTP_CODE"
            exit 1
          fi
          CLOUDINARY_ID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['public_id'])")
          echo "CLOUDINARY_ID=${CLOUDINARY_ID}" >> $GITHUB_ENV

      - name: Record backup metadata
        if: env.SKIP != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Get table counts via direct SQL
          COUNTS=$(psql "$DATABASE_URL" -t -A -F'|' -c "
            SELECT
              (SELECT count(*) FROM posts WHERE deleted_at IS NULL),
              (SELECT count(*) FROM categories WHERE deleted_at IS NULL),
              (SELECT count(*) FROM tags),
              (SELECT count(*) FROM media_items);
          ")
          POST_COUNT=$(echo "$COUNTS" | cut -d'|' -f1)
          CATEGORY_COUNT=$(echo "$COUNTS" | cut -d'|' -f2)
          TAG_COUNT=$(echo "$COUNTS" | cut -d'|' -f3)
          MEDIA_COUNT=$(echo "$COUNTS" | cut -d'|' -f4)

          # Generate a short ID
          BACKUP_ID=$(cat /dev/urandom | tr -dc 'a-z0-9' | head -c 12)

          psql "$DATABASE_URL" -c "
            INSERT INTO backups (id, cloudinary_id, filename, bytes, post_count, category_count, tag_count, media_count)
            VALUES ('${BACKUP_ID}', '${CLOUDINARY_ID}', '${BACKUP_FILE}', ${BACKUP_SIZE}, ${POST_COUNT}, ${CATEGORY_COUNT}, ${TAG_COUNT}, ${MEDIA_COUNT});
          "

      - name: Cleanup old backups (30+ days)
        if: env.SKIP != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          # Get backups older than 30 days
          OLD_BACKUPS=$(psql "$DATABASE_URL" -t -A -F'|' -c "
            SELECT id, cloudinary_id FROM backups
            WHERE created_at < NOW() - INTERVAL '30 days';
          ")

          if [ -z "$OLD_BACKUPS" ]; then
            echo "No old backups to clean up."
            exit 0
          fi

          echo "$OLD_BACKUPS" | while IFS='|' read -r ID CLOUD_ID; do
            echo "Deleting backup: $ID ($CLOUD_ID)"
            # Delete from Cloudinary via Admin API (raw resource)
            curl -s -X DELETE \
              "https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/resources/raw/upload?public_ids[]=${CLOUD_ID}" \
              -u "${CLOUDINARY_API_KEY}:${CLOUDINARY_API_SECRET}"
            # Delete from database
            psql "$DATABASE_URL" -c "DELETE FROM backups WHERE id = '${ID}';"
          done
